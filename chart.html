  el.dataset.cum = s.cum;
  el.dataset.rp = s.rp;
  el.dataset.re = s.re;
  el.dataset.rc = s.rc;
  svg.appendChild(el);
});

// Tooltip
const tooltip = document.getElementById("tooltip");
document.querySelectorAll(".dot").forEach(dot => {
  dot.addEventListener("mouseenter", () => {
    const name = dot.dataset.name;
    const avg = dot.dataset.avg;
    const eps = dot.dataset.eps;
    const cum = parseInt(dot.dataset.cum).toLocaleString();
    let detail = "";
    if (currentMode === "peak")  detail = `~${avg}M avg viewers`;
    if (currentMode === "cum")   detail = `~${cum}M est. cumulative`;
    if (currentMode === "eps")   detail = `${parseInt(eps).toLocaleString()} episodes`;
    tooltip.innerHTML = `<span style="font-weight:600">${name}</span> &nbsp;<span style="font-weight:400;color:#888780">${detail}</span>`;
    tooltip.style.display = "block";
  });
  dot.addEventListener("mousemove", e => {
    tooltip.style.left = (e.clientX + 14) + "px";
    tooltip.style.top  = (e.clientY - 36) + "px";
  });
  dot.addEventListener("mouseleave", () => {
    tooltip.style.display = "none";
  });
});

// Mode switching
function setMode(mode) {
  currentMode = mode;
  const rKey = mode === "peak" ? "rp" : mode === "cum" ? "rc" : "re";
  document.querySelectorAll(".dot").forEach(dot => {
    dot.setAttribute("r", dot.dataset[rKey]);
  });
  // Update quadrant labels
  const qt = qtTotals[mode];
  document.getElementById("qt-lw").textContent = qt.lw;
  document.getElementById("qt-hw").textContent = qt.hw;
  document.getElementById("qt-ld").textContent = qt.ld;
  document.getElementById("qt-hd").textContent = qt.hd;
  // Update stat line
  document.getElementById("stat-line").innerHTML = qt.stat;
  // Update disclaimer
  document.getElementById("disclaimer-text").textContent = disclaimers[mode];
  // Update buttons
  document.querySelectorAll(".toggle-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.mode === mode);
  });
}

document.querySelectorAll(".toggle-btn").forEach(btn => {
  btn.addEventListener("click", () => setMode(btn.dataset.mode));
});
</script>

</body>
</html>
